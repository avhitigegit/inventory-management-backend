# =============================================
# Database Configuration
# =============================================
# Port 5433 matches the host port defined in docker-compose.yml
# Credentials must match POSTGRES_USER and POSTGRES_PASSWORD in docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5433/hardware_db
spring.datasource.username=hardware_user
spring.datasource.password=hardware123
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT Configuration
# =============================================
jwt.secret=your_very_long_secret_key_minimum_256_bits_replace_this_in_production
jwt.expiration=86400000

# =============================================
# Server
# =============================================
server.port=8080
